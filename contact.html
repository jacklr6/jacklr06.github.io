<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jackr.dev</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --accent-border: #6366f1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Floating Navigation Toolbar */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            width: 95%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 50px;
            padding: 0.75rem 1rem;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 2rem;
            align-items: center;
            max-width: 95vw;
        }

        .nav-brand {
            padding: 0rem 0rem 0rem 1rem;
            font-weight: 700;
            font-size: 1.1rem;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .nav-toggle {
            display: none;
            margin-left: auto;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0.4rem;
            border-radius: 8px;
        }

        .nav-toggle .hamburger,
        .nav-toggle .hamburger::before,
        .nav-toggle .hamburger::after {
            display: block;
            width: 20px;
            height: 2px;
            background: var(--text-main);
            border-radius: 2px;
            position: relative;
        }
        .nav-toggle .hamburger::before,
        .nav-toggle .hamburger::after {
            content: '';
            position: absolute;
            left: 0;
            transition: transform 0.2s ease;
        }
        .nav-toggle .hamburger::before { top: -6px; }
        .nav-toggle .hamburger::after { top: 6px; }

        .nav-brand:hover {
            opacity: 0.8;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--text-main);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(to right, #6366f1, #a5b4fc);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .cta-button {
            margin-left: auto;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        /* Main Content */
        .hero {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }

        .hero-content {
            max-width: 600px;
            padding-bottom: 2rem;
        }

        h1 {
            font-size: 4.25rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.3;
            opacity: 1;
        }


        @media (max-width: 768px) {
            nav {
                padding: 0.6rem 1rem;
                gap: 1rem;
                max-width: 95vw;
            }

            .nav-toggle {
                display: block;
            }

            .nav-links {
                display: none;
                position: absolute;
                top: calc(100% + 10px);
                left: 50%;
                transform: translateX(-50%);
                background: rgba(17,24,39,0.9);
                border-radius: 12px;
                padding: 0.75rem 1rem;
                flex-direction: column;
                gap: 0.75rem;
                min-width: min(90vw, 320px);
                box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            }

            .nav-links.open {
                display: flex;
            }

            .nav-links a {
                font-size: 0.95rem;
            }

            .nav-links li {
                list-style: none;
            }

            .cta-button {
                margin-left: 0.5rem;
            }

            h1 {
                font-size: 2.5rem;
            }
        }

    </style>
</head >
<body>
    <!-- Floating Navigation Toolbar -->
    <nav>
        <a href="index.html" class="nav-brand">jackr.dev</a>
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
            <span class="hamburger"></span>
        </button>
        <ul class="nav-links">
            <li><a href="construction.html">About</a></li>
            <li><a href="construction.html">Work</a></li>
            <li><a href="construction.html">Blog</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <a href="contact.html" class="cta-button">Get in Touch</a>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Contact Us</h1>
        </div>
    </section>

    <script>
        (function() {
            const toggle = document.querySelector('.nav-toggle');
            const links = document.querySelector('.nav-links');
            if (!toggle || !links) return;
            toggle.addEventListener('click', () => {
                const expanded = toggle.getAttribute('aria-expanded') === 'true';
                toggle.setAttribute('aria-expanded', (!expanded).toString());
                links.classList.toggle('open');
            });
            document.addEventListener('click', (e) => {
                if (!links.classList.contains('open')) return;
                const target = e.target;
                if (!links.contains(target) && !toggle.contains(target)) {
                    links.classList.remove('open');
                    toggle.setAttribute('aria-expanded', 'false');
                }
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && links.classList.contains('open')) {
                    links.classList.remove('open');
                    toggle.setAttribute('aria-expanded', 'false');
                }
            });
        })();
    </script>

</body>
</html >
